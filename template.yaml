AWSTemplateFormatVersion: '2010-09-09'
Description: 'Drift Test 07 - VPC with Public/Private Subnets, IGW, and Route Tables (Medium-High Complexity)'

Resources:
  DriftTestVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: drift-test-07-vpc
        - Key: Environment
          Value: test
        - Key: DriftTest
          Value: '07'
        - Key: DriftInduced
          Value: 'true'
        - Key: Round
          Value: '1'

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId:!Ref DriftTestVPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone:!Select [0,!GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: drift-test-07-public-a
        - Key: Environment
          Value: test

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId:!Ref DriftTestVPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone:!Select [1,!GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: drift-test-07-public-b
        - Key: Environment
          Value: test

  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId:!Ref DriftTestVPC
      CidrBlock: 10.0.11.0/24
      AvailabilityZone:!Select [0,!GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: drift-test-07-private-a
        - Key: Environment
          Value: test

  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId:!Ref DriftTestVPC
      CidrBlock: 10.0.12.0/24
      AvailabilityZone:!Select [1,!GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: drift-test-07-private-b
        - Key: Environment
          Value: test

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: drift-test-07-igw
        - Key: Environment
          Value: test

  IGWAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId:!Ref DriftTestVPC
      InternetGatewayId:!Ref InternetGateway

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId:!Ref DriftTestVPC
      Tags:
        - Key: Name
          Value: drift-test-07-public-rt
        - Key: Environment
          Value: test

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: IGWAttachment
    Properties:
      RouteTableId:!Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId:!Ref InternetGateway

  PublicSubnetAAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId:!Ref PublicSubnetA
      RouteTableId:!Ref PublicRouteTable

  PublicSubnetBAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId:!Ref PublicSubnetB
      RouteTableId:!Ref PublicRouteTable

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId:!Ref DriftTestVPC
      Tags:
        - Key: Name
          Value: drift-test-07-private-rt
        - Key: Environment
          Value: test

  PrivateSubnetAAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId:!Ref PrivateSubnetA
      RouteTableId:!Ref PrivateRouteTable

  PrivateSubnetBAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId:!Ref PrivateSubnetB
      RouteTableId:!Ref PrivateRouteTable

Outputs:
  VpcId:
    Value:!Ref DriftTestVPC
  PublicSubnetAId:
    Value:!Ref PublicSubnetA
  PublicSubnetBId:
    Value:!Ref PublicSubnetB
  PrivateSubnetAId:
    Value:!Ref PrivateSubnetA
  PrivateSubnetBId:
    Value:!Ref PrivateSubnetB
